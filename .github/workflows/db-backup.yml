name: Daily Database Backup

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 08:00 Việt Nam mỗi ngày
  workflow_dispatch:        # Cho phép chạy thủ công bất cứ lúc nào

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4

      - name: Install pg_dump
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-16

      - name: Run pg_dump
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="backups/wellkoc_${TIMESTAMP}.sql.gz"
          mkdir -p backups

          pg_dump \
            --host=${{ secrets.DB_HOST }} \
            --port=6543 \
            --username=${{ secrets.DB_USER }} \
            --dbname=${{ secrets.DB_NAME }} \
            --no-owner \
            --no-acl \
            --clean \
            --if-exists \
            | gzip > "$FILENAME"

          echo "✅ Backup saved: $FILENAME ($(du -sh $FILENAME | cut -f1))"

      - name: Keep only last 14 backups
        run: |
          cd backups
          ls -t *.sql.gz | tail -n +15 | xargs -r rm
          echo "📁 Backups retained: $(ls *.sql.gz | wc -l)"

      - name: Commit backup to repo
        run: |
          git config user.name  "WellKOC Backup Bot"
          git config user.email "backup@wellkoc.com"
          git add backups/
          git diff --staged --quiet || git commit -m "🗄️ Auto backup $(date '+%Y-%m-%d %H:%M') ICT"
          git push

      - name: Upload to S3 (if configured)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-southeast-1

      - name: S3 push
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        run: |
          LATEST=$(ls -t backups/*.sql.gz | head -1)
          aws s3 cp "$LATEST" s3://wellkoc-backups/db/$(basename $LATEST)
          echo "☁️ Uploaded to S3"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d '{"text":"🚨 WellKOC DB backup FAILED! Check GitHub Actions immediately."}' \
            || true
